name: Deploy Cockpit DSI to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-cockpit-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déclenche le déploiement du cockpit sur le VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 75.119.136.141
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          # Clé restreinte côté serveur (forced command) :
          # exécute /apps/cockpit-dsi/deploy.sh quel que soit le script envoyé.
          script: deploy
